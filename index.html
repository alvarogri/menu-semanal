<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menú Semanal 🍽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:#7a9e7e;--sage-light:#e8f0e9;--sage-dark:#4a6b4e;
    --cream:#faf8f3;--warm:#f0ebe0;--text:#2a2a2a;
    --text-muted:#7a7570;--text-light:#aaa8a3;
    --border:#e0dbd0;--white:#ffffff;--red:#c0392b;
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;font-size:15px}

  #loginScreen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1.5rem}
  #loginScreen h1{font-family:'Lora',serif;font-size:32px;color:var(--sage-dark);margin-bottom:.4rem;text-align:center}
  #loginScreen .subtitle{color:var(--text-muted);font-size:14px;text-align:center;margin-bottom:2rem}
  .login-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:1.75rem 1.5rem;width:100%;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
  .login-card label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .login-card input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--cream);margin-bottom:1rem;outline:none;transition:border-color .15s}
  .login-card input:focus{border-color:var(--sage)}
  .login-card input.error{border-color:var(--red)}
  .login-error{color:var(--red);font-size:13px;margin-bottom:.75rem;display:none;text-align:center}
  .btn-main{width:100%;padding:12px;background:var(--sage);color:white;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:background .2s}
  .btn-main:hover{background:var(--sage-dark)}
  .btn-main:disabled{opacity:.6;cursor:not-allowed}

  #app{display:none;max-width:480px;margin:0 auto;padding-bottom:80px}
  .app-header{background:var(--white);border-bottom:1px solid var(--border);padding:1rem 1.25rem 0;position:sticky;top:0;z-index:50}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
  .header-top h1{font-family:'Lora',serif;font-size:20px;color:var(--sage-dark)}
  .header-user{display:flex;align-items:center;gap:8px}
  .user-badge{font-size:12px;color:var(--text-muted);background:var(--sage-light);border-radius:20px;padding:4px 10px}
  .sync-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer}
  .sync-btn:hover{border-color:var(--red);color:var(--red)}
  .sync-indicator{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--sage-light);color:var(--sage-dark);display:none}
  .sync-indicator.visible{display:inline-block}
  .sync-indicator.error{background:#ffeaea;color:var(--red)}
  .week-nav{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
  .week-nav button{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:13px;cursor:pointer;color:var(--text)}
  .week-nav button:hover{background:var(--sage-light)}
  .week-label{flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--text-muted)}
  .tabs{display:flex;border-bottom:1px solid var(--border)}
  .tab{flex:1;padding:10px 0;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:var(--text-muted);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
  .tab.active{color:var(--sage-dark);border-bottom-color:var(--sage)}

  .planner{padding:1rem 1.25rem}
  .day-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;transition:opacity .2s}
  .day-card.off{opacity:.5}
  .day-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--warm);border-bottom:1px solid var(--border)}
  .day-name{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--sage-dark)}
  .day-date{font-size:12px;color:var(--text-muted);margin-top:1px}
  .day-toggle-wrap{display:flex;align-items:center;gap:7px}
  .day-toggle-label{font-size:12px;color:var(--text-muted)}
  .toggle{width:36px;height:20px;border-radius:10px;background:var(--border);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
  .toggle.on{background:var(--sage)}
  .toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:white;top:3px;left:3px;transition:transform .2s}
  .toggle.on::after{transform:translateX(16px)}
  .meal-rows{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
  .meal-row{display:flex;align-items:center;gap:8px}
  .meal-label{font-size:11px;font-weight:500;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;width:44px;flex-shrink:0}
  .meal-select{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--cream);cursor:pointer;outline:none;max-width:100%}
  .meal-select:focus{border-color:var(--sage)}
  .day-card.off .meal-rows{pointer-events:none}

  .recipes{padding:1rem 1.25rem}
  .recipes-toolbar{display:flex;gap:8px;margin-bottom:1rem}
  .search-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;background:var(--white);outline:none;color:var(--text)}
  .search-input:focus{border-color:var(--sage)}
  .btn-add{padding:9px 16px;background:var(--sage);color:white;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
  .btn-add:hover{background:var(--sage-dark)}
  .recipe-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
  .recipe-main{display:flex;align-items:center;padding:12px 14px;gap:12px}
  .recipe-emoji{font-size:28px;width:44px;text-align:center;flex-shrink:0}
  .recipe-info{flex:1;min-width:0}
  .recipe-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .recipe-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
  .recipe-btns{display:flex;gap:4px;flex-shrink:0}
  .icon-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-muted);transition:all .15s}
  .icon-btn:hover{background:var(--sage-light);color:var(--sage-dark);border-color:var(--sage)}
  .icon-btn.delete:hover{background:#ffeaea;color:var(--red);border-color:var(--red)}
  .recipe-ings{padding:0 14px 12px;display:none}
  .recipe-ings.open{display:block}
  .ing-separator{border:none;border-top:1px solid var(--border);margin-bottom:10px}
  .ing-tags{display:flex;flex-wrap:wrap;gap:5px}
  .ing-tag{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--sage-light);color:var(--sage-dark)}
  .recipe-notes{font-size:12px;color:var(--text-muted);margin-top:8px;font-style:italic}
  .empty{text-align:center;padding:2.5rem 1rem;color:var(--text-muted);font-size:14px}
  .empty-icon{font-size:40px;margin-bottom:10px}

  .shopping{padding:1rem 1.25rem}
  .shop-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
  .shop-head h2{font-family:'Lora',serif;font-size:17px;color:var(--sage-dark)}
  .btn-clear{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:none;font-size:12px;cursor:pointer;color:var(--text-muted)}
  .btn-clear:hover{border-color:var(--red);color:var(--red)}
  .shop-summary{background:var(--sage-light);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;color:var(--sage-dark);margin-bottom:1rem}
  .shop-cat-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);padding:0 4px;margin:1rem 0 6px;font-weight:500}
  .shop-item{display:flex;align-items:center;gap:10px;padding:9px 4px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s}
  .shop-item:hover{background:var(--warm)}
  .check-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;background:var(--white)}
  .shop-item.done .check-box{background:var(--sage);border-color:var(--sage);color:white}
  .shop-item-text{font-size:14px;flex:1;transition:all .15s}
  .shop-item.done .shop-item-text{text-decoration:line-through;color:var(--text-light)}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  .modal{background:var(--white);border-radius:var(--radius) var(--radius) 0 0;padding:1.5rem 1.25rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-title{font-family:'Lora',serif;font-size:18px;color:var(--sage-dark);margin-bottom:1.25rem}
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--cream);outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--sage)}
  .field textarea{min-height:70px;resize:vertical;line-height:1.5}
  .ing-row{display:flex;gap:6px}
  .ing-row input{flex:1}
  .btn-ing{padding:9px 14px;background:var(--sage-light);color:var(--sage-dark);border:none;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;white-space:nowrap}
  .ing-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .chip{display:flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:20px;background:var(--sage-light);color:var(--sage-dark)}
  .chip button{background:none;border:none;cursor:pointer;color:var(--sage-dark);font-size:14px;line-height:1;padding:0}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
  .btn-cancel{padding:10px 18px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;color:var(--text-muted)}
  .btn-save{padding:10px 22px;background:var(--sage);color:white;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
  .btn-save:hover{background:var(--sage-dark)}

  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;color:var(--text-muted);font-size:14px}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:420px){.app-header,.planner,.recipes,.shopping{padding-left:1rem;padding-right:1rem}}
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <span>Cargando...</span>
</div>

<div id="loginScreen">
  <h1>🍽</h1>
  <p class="subtitle">Menú semanal · Acceso privado</p>
  <div class="login-card">
    <label>Usuario</label>
    <input type="text" id="loginUser" placeholder="Tu nombre de usuario" autocomplete="username" autocapitalize="none" />
    <label>Contraseña</label>
    <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()" />
    <div class="login-error" id="loginError">Usuario o contraseña incorrectos</div>
    <button class="btn-main" id="loginBtn" onclick="doLogin()">Entrar →</button>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <div class="header-top">
      <h1>🍽 Menú</h1>
      <div class="header-user">
        <span class="sync-indicator" id="syncIndicator"></span>
        <span class="user-badge" id="userBadge"></span>
        <button class="sync-btn" onclick="doLogout()">🔒 Salir</button>
      </div>
    </div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">‹ Antes</button>
      <span class="week-label" id="weekLabel"></span>
      <button onclick="changeWeek(1)">Después ›</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('planner')">📅 Semana</button>
      <button class="tab" onclick="showTab('recipes')">📖 Recetas</button>
      <button class="tab" onclick="showTab('shopping')">🛒 Compra</button>
    </div>
  </div>
  <div id="planner" class="planner section"></div>
  <div id="recipes" class="recipes section" style="display:none"></div>
  <div id="shopping" class="shopping section" style="display:none"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nueva receta</div>
    <div class="field"><label>Nombre de la receta</label><input type="text" id="rName" placeholder="Ej: Pasta carbonara" /></div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1"><label>Tipo</label><select id="rType"><option value="comida">Comida</option><option value="cena">Cena</option><option value="ambos">Ambos</option></select></div>
      <div class="field" style="width:80px"><label>Emoji</label><input type="text" id="rEmoji" placeholder="🍝" maxlength="2" /></div>
    </div>
    <div class="field">
      <label>Ingredientes (para 2 personas)</label>
      <div class="ing-row">
        <input type="text" id="ingInput" placeholder="Ej: 200g pasta" onkeydown="if(event.key==='Enter'){addChip();event.preventDefault()}" />
        <button class="btn-ing" onclick="addChip()">+ Añadir</button>
      </div>
      <div class="ing-chips" id="ingChips"></div>
    </div>
    <div class="field"><label>Notas (opcional)</label><textarea id="rNotes" placeholder="Pasos, tiempo de cocción, consejos..."></textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveRecipe()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
const SB_URL = 'https://blesghbxrkkieytcckhg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsZXNnaGJ4cmtraWV5dGNja2hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDY5NTMsImV4cCI6MjA5NDc4Mjk1M30.X29I7bd7IwCS0rkyGgpknqbjKh46QI1sWVcot7JdJo0';
const SALT   = 'menu_semanal_salt_2024';

const DEFAULT_RECIPES = [
  {id:1,name:'Pasta boloñesa',type:'cena',emoji:'🍝',ingredients:['300g pasta','200g carne picada','1 cebolla','2 tomates','aceite','sal','orégano'],notes:''},
  {id:2,name:'Ensalada griega',type:'comida',emoji:'🥗',ingredients:['1 pepino','2 tomates','100g queso feta','aceitunas','cebolla roja','aceite de oliva'],notes:''},
  {id:3,name:'Tortilla de patatas',type:'ambos',emoji:'🥚',ingredients:['4 huevos','2 patatas medianas','1 cebolla','aceite','sal'],notes:'Freír patatas a fuego medio'},
  {id:4,name:'Arroz con pollo',type:'comida',emoji:'🍗',ingredients:['200g arroz','2 muslos de pollo','1 pimiento rojo','caldo de pollo','pimentón','sal','aceite'],notes:''},
  {id:5,name:'Crema de calabacín',type:'cena',emoji:'🥣',ingredients:['2 calabacines','1 patata','1 cebolla','100ml nata','caldo vegetal','sal','pimienta'],notes:''},
];

// ── SUPABASE HELPERS ─────────────────────────────────────────
async function sbFetch(path, opts={}) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
      ...(opts.headers||{})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function sbGet(table) {
  const rows = await sbFetch(`${table}?select=*`, { method:'GET', headers:{'Accept':'application/json','Prefer':''} });
  return rows;
}

async function sbUpsert(table, payload) {
  return sbFetch(`${table}`, {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify(payload)
  });
}

// ── AUTH ─────────────────────────────────────────────────────
const SESSION_KEY = 'menu_session_v4';

async function hashPassword(password) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password + SALT));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim().toLowerCase();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Comprobando...';
  try {
    const hash = await hashPassword(password);
    const rows = await sbFetch(
      `users?username=eq.${encodeURIComponent(username)}&password_hash=eq.${hash}&select=username`,
      { method:'GET', headers:{'Accept':'application/json','Prefer':''} }
    );
    if (rows && rows.length > 0) {
      localStorage.setItem(SESSION_KEY, JSON.stringify({ user: rows[0].username, exp: Date.now()+30*24*60*60*1000 }));
      await startApp(rows[0].username);
    } else {
      showLoginError();
    }
  } catch(e) {
    errEl.textContent='Error de conexión. Inténtalo de nuevo.';
    errEl.style.display='block';
  } finally {
    btn.disabled=false; btn.textContent='Entrar →';
  }
}

function showLoginError() {
  const errEl=document.getElementById('loginError');
  errEl.textContent='Usuario o contraseña incorrectos';
  errEl.style.display='block';
  const el=document.getElementById('loginPass');
  el.classList.add('error'); el.value='';
  setTimeout(()=>el.classList.remove('error'),1500);
}

function getSession() {
  try { const s=JSON.parse(localStorage.getItem(SESSION_KEY)); if(s&&Date.now()<s.exp) return s; } catch(e){}
  return null;
}

function doLogout() { localStorage.removeItem(SESSION_KEY); location.reload(); }

// ── STATE ────────────────────────────────────────────────────
const DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

let state = {
  recipes: [],
  weeks: {},
  checked: {},
  editingId: null,
  currentWeek: getWeekKey(new Date()),
  tempIng: []
};

let syncTimer = null;

// ── SYNC ─────────────────────────────────────────────────────
function showSync(msg, isError=false) {
  const el = document.getElementById('syncIndicator');
  el.textContent = msg;
  el.className = 'sync-indicator visible' + (isError ? ' error' : '');
}
function hideSync() {
  const el = document.getElementById('syncIndicator');
  el.className = 'sync-indicator';
}

async function loadFromSupabase() {
  // Recetas
  const recipeRows = await sbGet('recipes');
  if (recipeRows && recipeRows.length > 0) {
    // Tomar la fila más reciente (id=1 es nuestra fila única de recetas)
    const row = recipeRows.find(r => r.id === 1);
    if (row) state.recipes = row.data;
  } else {
    // Primera vez: subir recetas por defecto
    state.recipes = DEFAULT_RECIPES;
    await sbUpsert('recipes', { id: 1, data: state.recipes });
  }

  // Semanas
  const weekRows = await sbGet('weeks');
  if (weekRows) {
    weekRows.forEach(row => { state.weeks[row.week_key] = row.data; });
  }

  // Checked
  const checkedRows = await sbGet('shopping_checked');
  if (checkedRows) {
    checkedRows.forEach(row => { state.checked[row.week_key] = row.data; });
  }
}

async function saveRecipes() {
  showSync('Guardando...');
  try {
    await sbUpsert('recipes', { id: 1, data: state.recipes, updated_at: new Date().toISOString() });
    showSync('✓ Guardado');
    setTimeout(hideSync, 2000);
  } catch(e) {
    showSync('⚠ Error al guardar', true);
    setTimeout(hideSync, 3000);
  }
}

async function saveWeek() {
  showSync('Guardando...');
  try {
    await sbUpsert('weeks', { week_key: state.currentWeek, data: getWeekData(), updated_at: new Date().toISOString() });
    showSync('✓ Guardado');
    setTimeout(hideSync, 2000);
  } catch(e) {
    showSync('⚠ Error al guardar', true);
    setTimeout(hideSync, 3000);
  }
}

async function saveChecked() {
  try {
    await sbUpsert('shopping_checked', { week_key: state.currentWeek, data: state.checked[state.currentWeek]||{}, updated_at: new Date().toISOString() });
  } catch(e) { console.warn('Error guardando compra', e); }
}

// Debounce para no hacer una petición por cada cambio rápido
function scheduleSaveWeek() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(saveWeek, 800);
}

// ── WEEK UTILS ───────────────────────────────────────────────
// Devuelve "YYYY-MM-DD" del lunes de la semana de 'date', en hora local
function getWeekKey(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=dom, 1=lun ... 6=sab
  const diff = (day === 0 ? -6 : 1 - day); // días hasta el lunes
  d.setDate(d.getDate() + diff);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
// Parsea "YYYY-MM-DD" en hora local (sin conversión UTC)
function getWeekStart(key) {
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}
function getWeekLabel() {
  const d = getWeekStart(state.currentWeek);
  const e = new Date(d);
  e.setDate(d.getDate()+6);
  const fmt = x => x.toLocaleDateString('es',{day:'numeric',month:'short'});
  return fmt(d)+' — '+fmt(e);
}
function changeWeek(dir) {
  const d = getWeekStart(state.currentWeek);
  d.setDate(d.getDate() + dir*7);
  state.currentWeek = getWeekKey(d);
  document.getElementById('weekLabel').textContent = getWeekLabel();
  renderPlanner();
  if(document.getElementById('shopping').style.display!=='none') renderShopping();
}
function getWeekData() {
  if(!state.weeks[state.currentWeek])
    state.weeks[state.currentWeek]=DAYS.map(day=>({day,active:true,comida:'',cena:''}));
  return state.weeks[state.currentWeek];
}

// ── TABS ─────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>
    t.classList.toggle('active',['planner','recipes','shopping'][i]===name));
  ['planner','recipes','shopping'].forEach(id=>
    document.getElementById(id).style.display=id===name?'block':'none');
  if(name==='shopping') renderShopping();
}

// ── PLANNER ──────────────────────────────────────────────────
function renderPlanner() {
  const data=getWeekData();
  const comidas=state.recipes.filter(r=>r.type==='comida'||r.type==='ambos');
  const cenas=state.recipes.filter(r=>r.type==='cena'||r.type==='ambos');
  document.getElementById('planner').innerHTML=data.map((d,i)=>{
    const date=new Date(getWeekStart(state.currentWeek));
    date.setDate(date.getDate()+i);
    const dateStr=date.toLocaleDateString('es',{weekday:'short',day:'numeric',month:'short'});
    const opts=(list,slot)=>
      `<option value="">— Sin planificar —</option>`+
      list.map(r=>`<option value="${r.id}" ${d[slot]==r.id?'selected':''}>${r.emoji} ${r.name}</option>`).join('');
    return `<div class="day-card ${d.active?'':'off'}">
      <div class="day-head">
        <div><div class="day-name">${d.day}</div><div class="day-date">${dateStr}</div></div>
        <div class="day-toggle-wrap">
          <span class="day-toggle-label">${d.active?'En casa':'Fuera'}</span>
          <button class="toggle ${d.active?'on':''}" onclick="toggleDay(${i})"></button>
        </div>
      </div>
      <div class="meal-rows">
        <div class="meal-row"><span class="meal-label">Comida</span>
          <select class="meal-select" onchange="setMeal(${i},'comida',this.value)">${opts(comidas,'comida')}</select></div>
        <div class="meal-row"><span class="meal-label">Cena</span>
          <select class="meal-select" onchange="setMeal(${i},'cena',this.value)">${opts(cenas,'cena')}</select></div>
      </div>
    </div>`;
  }).join('');
}
function toggleDay(i) {
  getWeekData()[i].active=!getWeekData()[i].active;
  renderPlanner(); scheduleSaveWeek();
}
function setMeal(i,slot,val) {
  getWeekData()[i][slot]=val; scheduleSaveWeek();
}

// ── RECIPES ──────────────────────────────────────────────────
function renderRecipes() {
  const q=(document.getElementById('recipeSearch')||{value:''}).value.toLowerCase();
  const list=state.recipes.filter(r=>r.name.toLowerCase().includes(q));
  const tl={comida:'Comida',cena:'Cena',ambos:'Comida y cena'};
  document.getElementById('recipes').innerHTML=`
    <div class="recipes-toolbar">
      <input type="text" id="recipeSearch" class="search-input" placeholder="Buscar..." oninput="renderRecipes()" value="${q}" />
      <button class="btn-add" onclick="openModal()">+ Nueva</button>
    </div>
    ${list.length===0
      ?`<div class="empty"><div class="empty-icon">📖</div>No hay recetas todavía.<br>¡Añade la primera!</div>`
      :list.map(r=>`<div class="recipe-card">
        <div class="recipe-main">
          <div class="recipe-emoji">${r.emoji||'🍽'}</div>
          <div class="recipe-info">
            <div class="recipe-title">${r.name}</div>
            <div class="recipe-sub">${tl[r.type]} · ${r.ingredients.length} ingredientes</div>
          </div>
          <div class="recipe-btns">
            <button class="icon-btn" onclick="toggleIngPanel(${r.id})">📋</button>
            <button class="icon-btn" onclick="editRecipe(${r.id})">✏️</button>
            <button class="icon-btn delete" onclick="deleteRecipe(${r.id})">🗑</button>
          </div>
        </div>
        <div class="recipe-ings" id="ings_${r.id}">
          <hr class="ing-separator">
          <div class="ing-tags">${r.ingredients.map(i=>`<span class="ing-tag">${i}</span>`).join('')}</div>
          ${r.notes?`<div class="recipe-notes">${r.notes}</div>`:''}
        </div>
      </div>`).join('')}`;
}
function toggleIngPanel(id){const el=document.getElementById('ings_'+id);if(el)el.classList.toggle('open');}
function openModal(){
  state.editingId=null;state.tempIng=[];
  document.getElementById('modalTitle').textContent='Nueva receta';
  ['rName','rEmoji','rNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('rType').value='comida';
  document.getElementById('ingInput').value='';
  renderChips();document.getElementById('overlay').classList.add('open');
}
function editRecipe(id){
  const r=state.recipes.find(x=>x.id===id);if(!r)return;
  state.editingId=id;state.tempIng=[...r.ingredients];
  document.getElementById('modalTitle').textContent='Editar receta';
  document.getElementById('rName').value=r.name;
  document.getElementById('rType').value=r.type;
  document.getElementById('rEmoji').value=r.emoji||'';
  document.getElementById('rNotes').value=r.notes||'';
  document.getElementById('ingInput').value='';
  renderChips();document.getElementById('overlay').classList.add('open');
}
function deleteRecipe(id){
  if(!confirm('¿Eliminar esta receta?'))return;
  state.recipes=state.recipes.filter(r=>r.id!==id);
  Object.values(state.weeks).forEach(w=>w.forEach(d=>{if(d.comida==id)d.comida='';if(d.cena==id)d.cena='';}));
  renderRecipes();renderPlanner();saveRecipes();
}
function addChip(){const v=document.getElementById('ingInput').value.trim();if(!v)return;state.tempIng.push(v);document.getElementById('ingInput').value='';renderChips();}
function removeChip(i){state.tempIng.splice(i,1);renderChips();}
function renderChips(){
  document.getElementById('ingChips').innerHTML=state.tempIng.map((ing,i)=>
    `<div class="chip">${ing}<button onclick="removeChip(${i})">×</button></div>`).join('');
}
function saveRecipe(){
  const name=document.getElementById('rName').value.trim();if(!name){alert('Escribe el nombre');return;}
  const recipe={
    id:state.editingId||Date.now(),name,
    type:document.getElementById('rType').value,
    emoji:document.getElementById('rEmoji').value||'🍽',
    ingredients:[...state.tempIng],
    notes:document.getElementById('rNotes').value.trim()
  };
  if(state.editingId){const idx=state.recipes.findIndex(r=>r.id===state.editingId);if(idx>=0)state.recipes[idx]=recipe;}
  else state.recipes.push(recipe);
  closeModal();renderRecipes();renderPlanner();saveRecipes();
}
function closeModal(){document.getElementById('overlay').classList.remove('open');state.editingId=null;state.tempIng=[];}

// ── SHOPPING ─────────────────────────────────────────────────
const CATS={
  'Frutas y verduras':['tomate','cebolla','pimiento','calabacín','patata','zanahoria','pepino','ajo','espinaca','brócoli','lechuga','berenjena','col','puerro','limón','naranja','manzana','plátano','aguacate','boniato'],
  'Carnes y pescados':['pollo','carne','ternera','cerdo','salmón','atún','bacalao','gambas','pescado','merluza','lubina','jamón','chorizo','pavo','pechuga'],
  'Lácteos y huevos':['huevo','queso','leche','nata','yogur','mantequilla','feta','mozzarella','crema'],
  'Pasta, arroz y legumbres':['pasta','arroz','lenteja','garbanzo','fideo','macarrón','espagueti','alubia','quinoa'],
  'Condimentos y especias':['sal','aceite','orégano','pimentón','pimienta','comino','tomillo','laurel','vinagre','azúcar','salsa','mostaza'],
  'Pan y conservas':['pan','harina','tomate frito','caldo','lata','conserva'],
};
function categorize(ing){
  const low=ing.toLowerCase();
  for(const [cat,kw] of Object.entries(CATS)) if(kw.some(k=>low.includes(k))) return cat;
  return 'Otros';
}
function renderShopping(){
  const wd=getWeekData(),active=wd.filter(d=>d.active);
  const ids=[...new Set(active.flatMap(d=>[d.comida,d.cena]).filter(Boolean))];
  const recs=ids.map(id=>state.recipes.find(r=>r.id==id)).filter(Boolean);
  const el=document.getElementById('shopping');
  if(!state.checked[state.currentWeek]) state.checked[state.currentWeek]={};
  const ck=state.checked[state.currentWeek];
  if(recs.length===0){
    el.innerHTML=`<div class="shop-head"><h2>Lista de la compra</h2></div><div class="empty"><div class="empty-icon">🛒</div>Añade recetas al menú de esta semana<br>para generar la lista automáticamente.</div>`;
    return;
  }
  const all={};
  recs.forEach(r=>r.ingredients.forEach(ing=>{all[ing]=(all[ing]||0)+1;}));
  const byCat={};
  Object.keys(all).forEach(ing=>{const cat=categorize(ing);if(!byCat[cat])byCat[cat]=[];byCat[cat].push(ing);});
  const total=Object.keys(all).length,done=Object.values(ck).filter(Boolean).length;
  el.innerHTML=`<div class="shop-head"><h2>Lista de la compra</h2><button class="btn-clear" onclick="clearChecked()">Limpiar</button></div>
    <div class="shop-summary">${active.length} días · ${recs.length} recetas · ${done}/${total} ingredientes ✓</div>
    ${Object.entries(byCat).sort(([a],[b])=>a.localeCompare(b)).map(([cat,items])=>`
      <div class="shop-cat-label">${cat}</div>
      ${items.map(ing=>{const id='i_'+ing.replace(/[^a-z0-9]/gi,'_');
        return`<div class="shop-item ${ck[id]?'done':''}" onclick="toggleCheck('${id}')"><div class="check-box">${ck[id]?'✓':''}</div><span class="shop-item-text">${ing}</span></div>`;
      }).join('')}`).join('')}`;
}
function toggleCheck(id){
  if(!state.checked[state.currentWeek]) state.checked[state.currentWeek]={};
  state.checked[state.currentWeek][id]=!state.checked[state.currentWeek][id];
  saveChecked();renderShopping();
}
function clearChecked(){state.checked[state.currentWeek]={};saveChecked();renderShopping();}

// ── INIT ─────────────────────────────────────────────────────
async function startApp(username) {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('loadingScreen').style.display='flex';

  try {
    await loadFromSupabase();
  } catch(e) {
    console.warn('Error cargando de Supabase:', e);
  }

  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('userBadge').textContent='👤 '+username;
  document.getElementById('weekLabel').textContent=getWeekLabel();
  renderPlanner();renderRecipes();
}

window.onload = async () => {
  const session = getSession();
  if (session) {
    await startApp(session.user);
  } else {
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    setTimeout(()=>document.getElementById('loginUser').focus(),100);
  }
};
</script>
